# Shamrock Bail Bonds — Telegram Mini Apps + AI Platform
# https://shamrock-telegram.netlify.app

[build]
  publish = "."
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ═══════════════════════════════════════════════════════
# HEADERS
# ═══════════════════════════════════════════════════════

# Telegram WebView requires permissive framing
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors *"
    Permissions-Policy = "geolocation=(self), camera=(self)"
    Access-Control-Allow-Origin = "*"

# Cache static assets
[[headers]]
  for = "/shared/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ═══════════════════════════════════════════════════════
# API REDIRECTS — clean /api/* paths to functions
# ═══════════════════════════════════════════════════════

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/ai-concierge"
  status = 200

# elevenlabs-init is now an EDGE function (near-zero cold start)
# See [[edge_functions]] block below — no redirect needed

[[redirects]]
  from = "/api/elevenlabs-postcall"
  to = "/.netlify/functions/elevenlabs-postcall"
  status = 200

[[redirects]]
