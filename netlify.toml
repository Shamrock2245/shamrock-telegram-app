  to = "/intake/index.html"
  status = 200

[[redirects]]
  from = "/payment/*"
  to = "/payment/index.html"
  status = 200

[[redirects]]
  from = "/status/*"
  to = "/status/index.html"
  status = 200

[[redirects]]
  from = "/updates/*"
  to = "/updates/index.html"
  status = 200

[[redirects]]
  from = "/documents/*"
  to = "/documents/index.html"
  status = 200

[[redirects]]
  from = "/defendant/*"
  to = "/defendant/index.html"
  status = 200

# ═══════════════════════════════════════════════════════
# BACKGROUND / SCHEDULED FUNCTION ROUTES
# Wires the 6 functions added in feat: add 4 background risk mitigation features
# ═══════════════════════════════════════════════════════

