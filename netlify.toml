# Shamrock Bail Bonds — Telegram Mini Apps + AI Platform
# https://shamrock-telegram.netlify.app

[build]
  publish = "."
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ═══════════════════════════════════════════════════════
# HEADERS
# ═══════════════════════════════════════════════════════

# Telegram WebView requires permissive framing
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors *"
    Permissions-Policy = "geolocation=(self), camera=(self)"
    Access-Control-Allow-Origin = "*"

# Cache static assets
[[headers]]
  for = "/shared/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ═══════════════════════════════════════════════════════
# API REDIRECTS — clean /api/* paths to functions
# ═══════════════════════════════════════════════════════

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/ai-concierge"
  status = 200

[[redirects]]
  from = "/api/risk-score"
  to = "/.netlify/functions/risk-score"
  status = 200

[[redirects]]
  from = "/api/summarize"
  to = "/.netlify/functions/intake-summarizer"
  status = 200

[[redirects]]
  from = "/api/charges"
  to = "/.netlify/functions/charge-analyzer"
  status = 200

[[redirects]]
  from = "/api/translate"
  to = "/.netlify/functions/translate"
  status = 200

[[redirects]]
  from = "/api/explain"
  to = "/.netlify/functions/document-explainer"
  status = 200

[[redirects]]
  from = "/api/notify"
  to = "/.netlify/functions/smart-notify"
  status = 200

[[redirects]]
  from = "/api/status"
  to = "/.netlify/functions/status-proxy"
  status = 200

# ═══════════════════════════════════════════════════════
# EDGE FUNCTIONS
# ═══════════════════════════════════════════════════════

[[edge_functions]]
  function = "county-detect"
  path = "/*"

[[edge_functions]]
  function = "language-detect"
  path = "/*"

# ═══════════════════════════════════════════════════════
# SPA-STYLE FALLBACKS for each mini app
# ═══════════════════════════════════════════════════════

[[redirects]]
  from = "/intake/*"
  to = "/intake/index.html"
  status = 200

[[redirects]]
  from = "/payment/*"
  to = "/payment/index.html"
  status = 200

[[redirects]]
  from = "/status/*"
  to = "/status/index.html"
  status = 200

[[redirects]]
  from = "/updates/*"
  to = "/updates/index.html"
  status = 200

[[redirects]]
  from = "/documents/*"
  to = "/documents/index.html"
  status = 200

[[redirects]]
  from = "/defendant/*"
  to = "/defendant/index.html"
  status = 200
