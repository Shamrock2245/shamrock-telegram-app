# Shamrock Bail Bonds — Telegram Mini Apps
# https://shamrock-telegram.netlify.app

[build]
  publish = "."

# Telegram WebView requires permissive framing
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors *"
    Permissions-Policy = "geolocation=(self), camera=(self)"
    Access-Control-Allow-Origin = "*"

# Cache static assets
[[headers]]
  for = "/shared/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# SPA-style fallbacks for each mini app
[[redirects]]
  from = "/intake/*"
  to = "/intake/index.html"
  status = 200

[[redirects]]
  from = "/payment/*"
  to = "/payment/index.html"
  status = 200

[[redirects]]
  from = "/status/*"
  to = "/status/index.html"
  status = 200
